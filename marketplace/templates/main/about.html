{% extends 'main/layout.html' %}

{% block title %}О нас{% endblock %}

{% block content %}
<div class="page-wrapper">

  <div class="anim-1">
    <span class="form-eyebrow">Наша история</span>
    <h1>Про <em>нас</em></h1>
    <div class="header-rule" style="max-width:400px; margin-bottom:40px;">
      <div class="header-rule-icon"></div>
    </div>
  </div>

  <div class="about-content anim-2">
    <p style="font-size:16px; max-width:600px; line-height:1.9; color:var(--muted);">
      Здесь будет информация о компании, её миссии и ценностях.
    </p>
  </div>

  <div class="anim-3" style="margin-top:48px;">
    <a href="{% url 'home-page' %}" class="btn btn-outline">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"
           style="margin-right:8px; position:relative; z-index:1;">
        <line x1="14" y1="10" x2="4" y2="10"/>
        <polyline points="8 6 4 10 8 14"/>
      </svg>
      <span>На главную</span>
    </a>
  </div>

</div>
{% endblock %}
