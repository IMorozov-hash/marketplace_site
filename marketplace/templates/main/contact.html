{% extends 'main/layout.html' %}

{% block title %}Контакты{% endblock %}

{% block content %}
<div class="page-wrapper">

  <div class="anim-1">
    <span class="form-eyebrow">Свяжитесь с нами</span>
    <h1>Страница с <em>контактами</em></h1>
    <div class="header-rule" style="max-width:400px; margin-bottom:40px;">
      <div class="header-rule-icon"></div>
    </div>
  </div>

  <div class="contacts-grid anim-2">

    <div class="contact-card">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <div class="contact-label">Email</div>
      <div class="contact-value">info@example.com</div>
    </div>

    <div class="contact-card">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.77a16 16 0 0 0 6 6l1.06-1.06a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </div>
      <div class="contact-label">Телефон</div>
      <div class="contact-value">+7 (000) 000-00-00</div>
    </div>

    <div class="contact-card">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
      </div>
      <div class="contact-label">Адрес</div>
      <div class="contact-value">г. Москва, ул. Примерная, 1</div>
    </div>

  </div>

  <div class="anim-3" style="margin-top:48px;">
    <a href="{% url 'home-page' %}" class="btn btn-outline">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"
           style="margin-right:8px; position:relative; z-index:1;">
        <line x1="14" y1="10" x2="4" y2="10"/>
        <polyline points="8 6 4 10 8 14"/>
      </svg>
      <span>На главную</span>
    </a>
  </div>

</div>

<style>
  .contacts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    max-width: 740px;
  }

  .contact-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 32px 28px;
    position: relative;
    transition: box-shadow 0.25s, transform 0.2s;
  }

  .contact-card::before {
    content: '';
    position: absolute;
    top: 0; left: 28px; right: 28px;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .contact-card:hover {
    box-shadow: 0 8px 32px rgba(0,0,0,0.07);
    transform: translateY(-2px);
  }

  .contact-card:hover::before { opacity: 1; }

  .contact-icon {
    width: 40px; height: 40px;
    background: rgba(200,169,110,0.1);
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .contact-icon svg { width: 18px; height: 18px; }

  .contact-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .contact-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--ink);
  }
</style>
{% endblock %}
